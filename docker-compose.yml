services:
  postgres:
    image: postgres:16-alpine
    container_name: bahia-news-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-bahia_news}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB:-bahia_news}"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bahia_news}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: bahia-news-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-bahia_news}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bahia_news}"
      NEXTAUTH_URL: "${NEXTAUTH_URL}"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
      NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: "${NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME}"
      CLOUDINARY_API_KEY: "${CLOUDINARY_API_KEY}"
      CLOUDINARY_API_SECRET: "${CLOUDINARY_API_SECRET}"
      ADMIN_EMAIL: "${ADMIN_EMAIL}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      NEWSAPI_KEY: "${NEWSAPI_KEY}"
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: >
      sh -c "npx prisma@5.14.0 db push && node server.js"

volumes:
  postgres_data:
